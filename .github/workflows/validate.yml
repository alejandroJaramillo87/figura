name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Managed blocks match canonical sources
        run: node scripts/build.js --check
      - name: Contract validator
        run: node scripts/validate.js
