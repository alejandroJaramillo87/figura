<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; }
  .slide {
    position: relative;
    width: 1600px;
    height: 900px;
    overflow: hidden;
    background: #ffffff;
  }
  /* Box 1: left -> right over 1000ms, linear. Midpoint at t=500ms is x=400. */
  #box1 {
    position: absolute;
    top: 100px;
    left: 0;
    width: 100px;
    height: 100px;
    background: #ff0000;
    animation: move 1000ms linear forwards;
  }
  /* Box 2: same path, 500ms duration, 400ms delay (idle-phase scrub case). */
  #box2 {
    position: absolute;
    top: 300px;
    left: 0;
    width: 100px;
    height: 100px;
    background: #0000ff;
    animation: move 500ms linear 400ms both;
  }
  @keyframes move {
    from { transform: translateX(0); }
    to   { transform: translateX(800px); }
  }
</style>
</head>
<body>
<div class="slide" data-loop-ms="1400">
  <div id="box1"></div>
  <div id="box2"></div>
</div>
</body>
</html>
