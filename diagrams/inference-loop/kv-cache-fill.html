<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KV cache fill during the decode loop</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>KV cache fill during the decode loop</h1>
<p>Prefill writes K/V for the whole prompt in one pass; each decode step appends exactly one row and attends over everything cached so far.</p>

<!-- fg:embed-start -->
<div class="fg-diagram fg-kv-cache-fill">
<style>
.fg-kv-cache-fill {
  --bg: #0f172a; --panel: #1e293b; --border: #334155;
  --text: #f8fafc; --muted: #94a3b8; --accent: #38bdf8;
  --ok: #34d399; --warn: #fbbf24; --violet: #a78bfa; --line: #64748b;
  background: var(--bg);
  border-radius: 12px;
  padding: 16px 16px 12px;
  font-family: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.fg-kv-cache-fill svg { display: block; width: 100%; height: auto; }
.fg-kv-cache-fill text { font-family: inherit; }

/* --- static styling ------------------------------------------------ */
.fg-kv-cache-fill .kvcf-label { fill: var(--text); font-size: 15px; font-weight: 600; }
.fg-kv-cache-fill .kvcf-sub   { fill: var(--muted); font-size: 12px; }
.fg-kv-cache-fill .kvcf-mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
.fg-kv-cache-fill .kvcf-cell  {
  fill: var(--panel); stroke: var(--border); stroke-width: 1.5;
  transition: fill 0.45s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.45s;
}
.fg-kv-cache-fill .kvcf-tok {
  fill: var(--panel); stroke: var(--border); stroke-width: 1.5;
  transition: fill 0.45s, stroke 0.45s;
}
.fg-kv-cache-fill .kvcf-tok-t { fill: var(--muted); font-size: 13px; text-anchor: middle; transition: fill 0.45s; }
.fg-kv-cache-fill .kvcf-arrow { stroke: var(--line); stroke-width: 2; fill: none; opacity: 0; transition: opacity 0.45s; }
.fg-kv-cache-fill .kvcf-read  { stroke: var(--accent); stroke-width: 2; fill: none; stroke-dasharray: 5 4; opacity: 0; transition: opacity 0.45s; }

/* --- step states ---------------------------------------------------
   Step 0: empty cache, prompt waiting.
   Step 1: prefill — all 4 prompt rows fill at once.
   Steps 2-4: decode — one generated token appended per step,
              attention reads over every filled row. */
.fg-kv-cache-fill[class*="is-step-"] .kvcf-phase { transition: opacity 0.45s; }

.fg-kv-cache-fill.is-step-1 .kvcf-row-p .kvcf-cell,
.fg-kv-cache-fill.is-step-2 .kvcf-row-p .kvcf-cell,
.fg-kv-cache-fill.is-step-3 .kvcf-row-p .kvcf-cell,
.fg-kv-cache-fill.is-step-4 .kvcf-row-p .kvcf-cell { fill: #0e4429; stroke: var(--ok); }

.fg-kv-cache-fill.is-step-2 .kvcf-row-d0 .kvcf-cell,
.fg-kv-cache-fill.is-step-3 .kvcf-row-d0 .kvcf-cell,
.fg-kv-cache-fill.is-step-4 .kvcf-row-d0 .kvcf-cell { fill: #4a3608; stroke: var(--warn); }
.fg-kv-cache-fill.is-step-3 .kvcf-row-d1 .kvcf-cell,
.fg-kv-cache-fill.is-step-4 .kvcf-row-d1 .kvcf-cell { fill: #4a3608; stroke: var(--warn); }
.fg-kv-cache-fill.is-step-4 .kvcf-row-d2 .kvcf-cell { fill: #4a3608; stroke: var(--warn); }

.fg-kv-cache-fill.is-step-1 .kvcf-tok-p { stroke: var(--ok); }
.fg-kv-cache-fill.is-step-1 .kvcf-tok-p + .kvcf-tok-t { fill: var(--text); }
.fg-kv-cache-fill.is-step-2 .kvcf-tok-g0,
.fg-kv-cache-fill.is-step-3 .kvcf-tok-g0,
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g0 { stroke: var(--warn); }
.fg-kv-cache-fill.is-step-3 .kvcf-tok-g1,
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g1 { stroke: var(--warn); }
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g2 { stroke: var(--warn); }
.fg-kv-cache-fill.is-step-2 .kvcf-tok-g0 + .kvcf-tok-t,
.fg-kv-cache-fill.is-step-3 .kvcf-tok-g0 + .kvcf-tok-t,
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g0 + .kvcf-tok-t,
.fg-kv-cache-fill.is-step-3 .kvcf-tok-g1 + .kvcf-tok-t,
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g1 + .kvcf-tok-t,
.fg-kv-cache-fill.is-step-4 .kvcf-tok-g2 + .kvcf-tok-t { fill: var(--text); }

.fg-kv-cache-fill.is-step-1 .kvcf-arrow-prefill { opacity: 1; }
.fg-kv-cache-fill.is-step-2 .kvcf-arrow-d0,
.fg-kv-cache-fill.is-step-3 .kvcf-arrow-d1,
.fg-kv-cache-fill.is-step-4 .kvcf-arrow-d2 { opacity: 1; }
.fg-kv-cache-fill.is-step-2 .kvcf-read,
.fg-kv-cache-fill.is-step-3 .kvcf-read,
.fg-kv-cache-fill.is-step-4 .kvcf-read { opacity: 1; }

/* phase captions */
.fg-kv-cache-fill .kvcf-phase { opacity: 0; }
.fg-kv-cache-fill.is-step-0 .kvcf-phase-idle,
.fg-kv-cache-fill.is-step-1 .kvcf-phase-prefill,
.fg-kv-cache-fill.is-step-2 .kvcf-phase-decode,
.fg-kv-cache-fill.is-step-3 .kvcf-phase-decode,
.fg-kv-cache-fill.is-step-4 .kvcf-phase-decode { opacity: 1; }

/* --- controls ------------------------------------------------------ */
.fg-kv-cache-fill .fg-controls {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.fg-kv-cache-fill .fg-controls button {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; width: 34px; height: 28px; font-size: 13px;
  cursor: pointer; padding: 0; line-height: 1;
}
.fg-kv-cache-fill .fg-controls button:hover { border-color: var(--accent); }
.fg-kv-cache-fill .fg-controls [data-fg="counter"] {
  color: var(--muted); font-size: 12px; margin-left: 4px;
  font-variant-numeric: tabular-nums;
}
@media (prefers-reduced-motion: reduce) {
  .fg-kv-cache-fill * { transition: none !important; }
}
</style>

<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img"

    <rect class="kvcf-tok kvcf-tok-p" x="30"  y="144" width="58" height="34" rx="6"/><text class="kvcf-tok-t" x="59"  y="166">sat</text>

    <rect class="kvcf-tok kvcf-tok-g2" x="30" y="322" width="58" height="34" rx="6"/><text class="kvcf-tok-t" x="59" y="344">.</text>
  </g>
  <text x="30" y="230" class="kvcf-sub">prompt ↑ · generated ↓</text>

  <!-- Write arrows token → cache row -->
  <defs>
    <marker id="kvcf-arrowhead" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>
  <g>
    <path class="kvcf-arrow kvcf-arrow-prefill" d="M 96 77  L 268 77"  marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-prefill" d="M 96 119 L 268 119" marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-prefill" d="M 96 161 L 268 161" marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-prefill" d="M 96 203 L 268 203" marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-d0" d="M 96 255 L 268 255" marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-d1" d="M 96 297 L 268 297" marker-end="url(#kvcf-arrowhead)"/>
    <path class="kvcf-arrow kvcf-arrow-d2" d="M 96 339 L 268 339" marker-end="url(#kvcf-arrowhead)"/>
  </g>

  <!-- KV cache grid: 7 rows (seq positions) x 2 groups (K | V) x 4 cells (head dim, symbolic) -->
  <text x="280" y="40" class="kvcf-label">KV cache</text>
  <text x="280" y="56" class="kvcf-sub kvcf-mono">K</text>
  <text x="460" y="56" class="kvcf-sub kvcf-mono">V</text>
  <g>
    <!-- Rows are authored statically (not generated) so the fragment stays portable -->
    <g class="kvcf-row-p">
      <rect class="kvcf-cell" x="280" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="63"  width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="63"  width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="63"  width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="280" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="105" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="105" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="105" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="280" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="147" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="147" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="147" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="280" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="189" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="189" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="189" width="40" height="28" rx="4"/>
    </g>
    <g class="kvcf-row-d0">
      <rect class="kvcf-cell" x="280" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="241" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="241" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="241" width="40" height="28" rx="4"/>
    </g>
    <g class="kvcf-row-d1">
      <rect class="kvcf-cell" x="280" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="283" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="283" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="283" width="40" height="28" rx="4"/>
    </g>
    <g class="kvcf-row-d2">
      <rect class="kvcf-cell" x="280" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="324" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="368" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="412" y="325" width="40" height="28" rx="4"/>
      <rect class="kvcf-cell" x="460" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="504" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="548" y="325" width="40" height="28" rx="4"/><rect class="kvcf-cell" x="592" y="325" width="40" height="28" rx="4"/>
    </g>
  </g>

  <!-- Attention read sweep (decode steps): bracket over cached region -->
  <path class="kvcf-read" d="M 650 63 L 662 63 L 662 353 L 650 353"/>
  <text x="672" y="200" class="kvcf-sub" transform="rotate(90 672 200)">attention reads all cached rows</text>

  <!-- Phase captions -->
  <text x="30" y="400" class="kvcf-sub kvcf-phase kvcf-phase-idle">Cache empty — prompt tokenized, nothing computed yet.</text>
  <text x="30" y="400" class="kvcf-sub kvcf-phase kvcf-phase-prefill">Prefill: one batched pass writes K/V for every prompt token (compute-bound).</text>
  <text x="30" y="400" class="kvcf-sub kvcf-phase kvcf-phase-decode">Decode: each step appends one K/V row, then reads the whole cache (memory-bound).</text>
</svg>

<div class="fg-controls">
  <button data-fg="prev" aria-label="Previous step">‹</button>
  <button data-fg="play" aria-label="Play or pause">▶</button>
  <button data-fg="next" aria-label="Next step">›</button>
  <span data-fg="counter"></span>
</div>

<script>(() => {
  const root = document.currentScript.closest('.fg-diagram');
  const TOTAL = 4, STEP_MS = 1400;
  let step = 0, timer = null;

  function apply() {
    for (let i = 0; i <= TOTAL; i++) root.classList.remove('is-step-' + i);
    root.classList.add('is-step-' + step);
    root.dispatchEvent(new CustomEvent('fg:step', { detail: { step } }));
  }
  const tl = {
    get step() { return step; },
    get playing() { return timer !== null; },
    go(n) { step = ((n % (TOTAL + 1)) + TOTAL + 1) % (TOTAL + 1); apply(); },
    next() { tl.go(step + 1); },
    prev() { tl.go(step - 1); },
    play() { if (!timer) { timer = setInterval(() => tl.next(), STEP_MS); } },
    pause() { clearInterval(timer); timer = null; },
  };

  const btn = (name) => root.querySelector('[data-fg="' + name + '"]');
  btn('prev').addEventListener('click', () => { tl.pause(); tl.prev(); });
  btn('next').addEventListener('click', () => { tl.pause(); tl.next(); });
  btn('play').addEventListener('click', () => (tl.playing ? tl.pause() : tl.play()));
  function sync() {
    btn('counter').textContent = tl.step + ' / ' + TOTAL;
    btn('play').textContent = tl.playing ? '❚❚' : '▶';
  }
  root.addEventListener('fg:step', sync);
  root.querySelectorAll('.fg-controls button').forEach((b) => b.addEventListener('click', sync));
  apply();

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    tl.go(TOTAL); // show final state, manual stepping still available
  } else {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => (e.isIntersecting ? tl.play() : tl.pause())),
      { threshold: 0.3 }
    );
    io.observe(root);
  }
})();</script>
</div>
<!-- fg:embed-end -->
</body>
</html>
