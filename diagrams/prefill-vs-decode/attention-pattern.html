<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attention pattern: prefill vs decode</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>Attention pattern: prefill vs decode</h1>
<p>The causal attention matrix. Prefill computes all prompt rows in one batched pass; decode computes exactly one new row per step.</p>

<!-- fg:embed-start -->
<div class="fg-diagram fg-attention-pattern">
<style>
/* fg:begin palette-classic v1 */
.fg-attention-pattern {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-hover: #334155;
  --border: #334155;
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --ok: #34d399;
  --warn: #fbbf24;
  --hot: #f87171;
  --violet: #a78bfa;
  --line: #64748b;
  --font: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  --radius: 12px;
  --radius-sm: 6px;
  --dur-step: 700ms;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
/* fg:end palette-classic */
/* fg:begin panel-base v1 */
.fg-attention-pattern {
  background: var(--bg);
  border-radius: 12px;
  font-family: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.fg-attention-pattern svg { display: block; width: 100%; height: auto; }
.fg-attention-pattern text { font-family: inherit; }
/* fg:end panel-base */
.fg-attention-pattern {
  padding: 16px 16px 12px;
}


.fg-attention-pattern .apf-lab  { fill: var(--muted); font-size: 13px; text-anchor: middle; }
.fg-attention-pattern .apf-head { fill: var(--text); font-size: 15px; font-weight: 600; }
.fg-attention-pattern .apf-sub  { fill: var(--muted); font-size: 12px; }

.fg-attention-pattern .apf-cell {
  fill: var(--panel); stroke: var(--border); stroke-width: 1;
  transition: fill 0.45s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.45s;
}
.fg-attention-pattern .apf-cell.apf-masked { fill: transparent; stroke: #24314a; stroke-dasharray: 3 3; }

/* Step states.
   0: empty. 1: prefill fills all causal cells of rows 0-3 at once (green).
   2,3,4: decode rows 4,5,6 fill one per step (amber), previous decode rows persist. */
.fg-attention-pattern.is-step-1 .apf-r0 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-1 .apf-r1 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-1 .apf-r2 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-1 .apf-r3 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-2 .apf-r0 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-2 .apf-r1 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-2 .apf-r2 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-2 .apf-r3 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r0 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r1 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r2 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r3 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r0 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r1 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r2 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r3 .apf-cell:not(.apf-masked) { fill: #0e4429; stroke: var(--ok); }

.fg-attention-pattern.is-step-2 .apf-r4 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r4 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r4 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r5 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r5 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r6 .apf-cell:not(.apf-masked) { fill: #4a3608; stroke: var(--warn); }

/* highlight the row being computed this step */
.fg-attention-pattern.is-step-2 .apf-r4 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-3 .apf-r5 .apf-cell:not(.apf-masked),
.fg-attention-pattern.is-step-4 .apf-r6 .apf-cell:not(.apf-masked) { stroke: var(--accent); stroke-width: 2; }

/* phase captions */
.fg-attention-pattern .apf-phase { opacity: 0; transition: opacity 0.45s; }
.fg-attention-pattern.is-step-0 .apf-phase-idle,
.fg-attention-pattern.is-step-1 .apf-phase-prefill,
.fg-attention-pattern.is-step-2 .apf-phase-decode,
.fg-attention-pattern.is-step-3 .apf-phase-decode,
.fg-attention-pattern.is-step-4 .apf-phase-decode { opacity: 1; }

/* fg:begin controls-bar v1 */
.fg-attention-pattern .fg-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.fg-attention-pattern .fg-controls button {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; width: 34px; height: 28px; font-size: 13px;
  cursor: pointer; padding: 0; line-height: 1;
}
.fg-attention-pattern .fg-controls button:hover { border-color: var(--fg-ctl-accent, var(--accent)); }
.fg-attention-pattern .fg-controls [data-fg="counter"] {
  color: var(--muted); font-size: 12px; margin-left: 4px;
  font-variant-numeric: tabular-nums;
}
/* fg:end controls-bar */
/* fg:begin reduced-motion v1 */
@media (prefers-reduced-motion: reduce) {
  .fg-attention-pattern, .fg-attention-pattern * { transition: none !important; animation: none !important; }
}
/* fg:end reduced-motion */
</style>

  <!-- legend -->

  <!-- phase captions -->
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-idle">Nothing computed yet — 7 positions: 4 prompt, 3 to generate.</text>
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-prefill">Prefill: rows 0–3 computed in one matmul — arithmetic-intensity heaven.</text>
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-decode">Decode: one query row per step — a skinny matvec against all cached keys.</text>
</svg>

<div class="fg-controls">
  <button data-fg="prev" aria-label="Previous step">‹</button>
  <button data-fg="play" aria-label="Play or pause">▶</button>
  <button data-fg="next" aria-label="Next step">›</button>
  <span data-fg="counter"></span>
</div>

<script>(() => {
  const root = document.currentScript.closest('.fg-diagram');
  const TOTAL = 4, STEP_MS = 1400;

  // fg:begin timeline-core v1
  let step = 0, timer = null;
  function apply() {
    for (let i = 0; i <= TOTAL; i++) root.classList.remove('is-step-' + i);
    root.classList.add('is-step-' + step);
    root.dispatchEvent(new CustomEvent('fg:step', { detail: { step } }));
  }
  const tl = {
    get step() { return step; },
    get playing() { return timer !== null; },
    go(n) { step = ((n % (TOTAL + 1)) + TOTAL + 1) % (TOTAL + 1); apply(); },
    next() { tl.go(step + 1); },
    prev() { tl.go(step - 1); },
    play() { if (!timer) { timer = setInterval(() => tl.next(), STEP_MS); root.classList.add('is-playing'); } },
    pause() { clearInterval(timer); timer = null; root.classList.remove('is-playing'); },
  };
  const btn = (name) => root.querySelector('[data-fg="' + name + '"]');
  btn('prev').addEventListener('click', () => { tl.pause(); tl.prev(); });
  btn('next').addEventListener('click', () => { tl.pause(); tl.next(); });
  btn('play').addEventListener('click', () => (tl.playing ? tl.pause() : tl.play()));
  const counter = btn('counter');
  function sync() {
    if (counter) counter.textContent = tl.step + ' / ' + TOTAL;
    btn('play').textContent = tl.playing ? '❚❚' : '▶';
  }
  root.addEventListener('fg:step', sync);
  root.querySelectorAll('.fg-controls button').forEach((b) => b.addEventListener('click', sync));
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // fg:end timeline-core

  // fg:begin timeline-start v1
  apply();
  if (reduced) {
    tl.go(TOTAL); // show final state, manual stepping still available
  } else {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => (e.isIntersecting ? tl.play() : tl.pause())),
      { threshold: 0.3 }
    );
    io.observe(root);
  }
  // fg:end timeline-start
})();</script>
</div>
<!-- fg:embed-end -->
</body>
