<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attention pattern: prefill vs decode</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>Attention pattern: prefill vs decode</h1>
<p>The causal attention matrix. Prefill computes all prompt rows in one batched pass; decode computes exactly one new row per step.</p>

<!-- sa:embed-start -->
<div class="sa-diagram sa-attention-pattern">
<style>
.sa-attention-pattern {
  --bg: #0f172a; --panel: #1e293b; --border: #334155;
  --text: #f8fafc; --muted: #94a3b8; --accent: #38bdf8;
  --ok: #34d399; --warn: #fbbf24; --line: #64748b;
  background: var(--bg);
  border-radius: 12px;
  padding: 16px 16px 12px;
  font-family: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.sa-attention-pattern svg { display: block; width: 100%; height: auto; }
.sa-attention-pattern text { font-family: inherit; }

.sa-attention-pattern .apf-lab  { fill: var(--muted); font-size: 13px; text-anchor: middle; }
.sa-attention-pattern .apf-head { fill: var(--text); font-size: 15px; font-weight: 600; }
.sa-attention-pattern .apf-sub  { fill: var(--muted); font-size: 12px; }

.sa-attention-pattern .apf-cell {
  fill: var(--panel); stroke: var(--border); stroke-width: 1;
  transition: fill 0.45s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.45s;
}
.sa-attention-pattern .apf-cell.apf-masked { fill: transparent; stroke: #24314a; stroke-dasharray: 3 3; }

/* Step states.
   0: empty. 1: prefill fills all causal cells of rows 0-3 at once (green).
   2,3,4: decode rows 4,5,6 fill one per step (amber), previous decode rows persist. */
.sa-attention-pattern.is-step-1 .apf-r0 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-1 .apf-r1 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-1 .apf-r2 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-1 .apf-r3 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-2 .apf-r0 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-2 .apf-r1 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-2 .apf-r2 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-2 .apf-r3 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r0 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r1 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r2 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r3 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r0 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r1 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r2 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r3 .apf-cell:not(.apf-masked) { fill: #0e4429; stroke: var(--ok); }

.sa-attention-pattern.is-step-2 .apf-r4 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r4 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r4 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r5 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r5 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r6 .apf-cell:not(.apf-masked) { fill: #4a3608; stroke: var(--warn); }

/* highlight the row being computed this step */
.sa-attention-pattern.is-step-2 .apf-r4 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-3 .apf-r5 .apf-cell:not(.apf-masked),
.sa-attention-pattern.is-step-4 .apf-r6 .apf-cell:not(.apf-masked) { stroke: var(--accent); stroke-width: 2; }

/* phase captions */
.sa-attention-pattern .apf-phase { opacity: 0; transition: opacity 0.45s; }
.sa-attention-pattern.is-step-0 .apf-phase-idle,
.sa-attention-pattern.is-step-1 .apf-phase-prefill,
.sa-attention-pattern.is-step-2 .apf-phase-decode,
.sa-attention-pattern.is-step-3 .apf-phase-decode,
.sa-attention-pattern.is-step-4 .apf-phase-decode { opacity: 1; }

.sa-attention-pattern .sa-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.sa-attention-pattern .sa-controls button {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; width: 34px; height: 28px; font-size: 13px;
  cursor: pointer; padding: 0; line-height: 1;
}
.sa-attention-pattern .sa-controls button:hover { border-color: var(--accent); }
.sa-attention-pattern .sa-controls [data-sa="counter"] {
  color: var(--muted); font-size: 12px; margin-left: 4px; font-variant-numeric: tabular-nums;
}
@media (prefers-reduced-motion: reduce) {
  .sa-attention-pattern * { transition: none !important; }
}
</style>

<svg viewBox="0 0 620 560" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="A 7 by 7 causal attention matrix. Prefill fills the first four rows in one pass; each decode step adds one more row along the causal mask.">
  <!-- axis labels -->
  <text x="300" y="26" class="apf-lab">keys (attended-to positions) →</text>
  <text x="30" y="300" class="apf-lab" transform="rotate(-90 30 300)">queries (rows) →</text>

  <!-- grid cells injected by JS below (57 cells would be unwieldy by hand;
       injection happens at parse time inside this fragment, so the embed
       stays self-contained) -->
  <g data-sa="grid"></g>

  <!-- legend -->
  <g>
    <rect x="60" y="510" width="16" height="16" rx="3" fill="#0e4429" stroke="#34d399"/>
    <text x="84" y="523" class="apf-sub">prefill (batched)</text>
    <rect x="210" y="510" width="16" height="16" rx="3" fill="#4a3608" stroke="#fbbf24"/>
    <text x="234" y="523" class="apf-sub">decode (1 row / step)</text>
    <rect x="390" y="510" width="16" height="16" rx="3" fill="none" stroke="#24314a" stroke-dasharray="3 3"/>
    <text x="414" y="523" class="apf-sub">masked (future)</text>
  </g>

  <!-- phase captions -->
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-idle">Nothing computed yet — 7 positions: 4 prompt, 3 to generate.</text>
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-prefill">Prefill: rows 0–3 computed in one matmul — arithmetic-intensity heaven.</text>
  <text x="60" y="552" class="apf-sub apf-phase apf-phase-decode">Decode: one query row per step — a skinny matvec against all cached keys.</text>
</svg>

<div class="sa-controls">
  <button data-sa="prev" aria-label="Previous step">‹</button>
  <button data-sa="play" aria-label="Play or pause">▶</button>
  <button data-sa="next" aria-label="Next step">›</button>
  <span data-sa="counter"></span>
</div>

<script>(() => {
  const root = document.currentScript.closest('.sa-diagram');
  const NS = 'http://www.w3.org/2000/svg';

  // Build the 7x7 grid: cell size 56, gap 6, origin (72, 44)
  const grid = root.querySelector('[data-sa="grid"]');
  const N = 7, SIZE = 56, GAP = 6, OX = 72, OY = 44;
  const tokens = ['The', 'cat', 'sat', 'on', 'the', 'mat', '.'];
  for (let r = 0; r < N; r++) {
    const row = document.createElementNS(NS, 'g');
    row.setAttribute('class', 'apf-r' + r);
    for (let c = 0; c < N; c++) {
      const cell = document.createElementNS(NS, 'rect');
      cell.setAttribute('class', 'apf-cell' + (c > r ? ' apf-masked' : ''));
      cell.setAttribute('x', OX + c * (SIZE + GAP));
      cell.setAttribute('y', OY + r * (SIZE + GAP));
      cell.setAttribute('width', SIZE);
      cell.setAttribute('height', SIZE);
      cell.setAttribute('rx', 6);
      row.appendChild(cell);
    }
    // row token label
    const lab = document.createElementNS(NS, 'text');
    lab.setAttribute('class', 'apf-sub');
    lab.setAttribute('x', OX - 8);
    lab.setAttribute('y', OY + r * (SIZE + GAP) + SIZE / 2 + 4);
    lab.setAttribute('text-anchor', 'end');
    lab.textContent = tokens[r];
    row.appendChild(lab);
    grid.appendChild(row);
  }

  const TOTAL = 4, STEP_MS = 1400;
  let step = 0, timer = null;
  function apply() {
    for (let i = 0; i <= TOTAL; i++) root.classList.remove('is-step-' + i);
    root.classList.add('is-step-' + step);
    root.dispatchEvent(new CustomEvent('sa:step', { detail: { step } }));
  }
  const tl = {
    get step() { return step; },
    get playing() { return timer !== null; },
    go(n) { step = ((n % (TOTAL + 1)) + TOTAL + 1) % (TOTAL + 1); apply(); },
    next() { tl.go(step + 1); },
    prev() { tl.go(step - 1); },
    play() { if (!timer) { timer = setInterval(() => tl.next(), STEP_MS); } },
    pause() { clearInterval(timer); timer = null; },
  };
  const btn = (name) => root.querySelector('[data-sa="' + name + '"]');
  btn('prev').addEventListener('click', () => { tl.pause(); tl.prev(); });
  btn('next').addEventListener('click', () => { tl.pause(); tl.next(); });
  btn('play').addEventListener('click', () => (tl.playing ? tl.pause() : tl.play()));
  function sync() {
    btn('counter').textContent = tl.step + ' / ' + TOTAL;
    btn('play').textContent = tl.playing ? '❚❚' : '▶';
  }
  root.addEventListener('sa:step', sync);
  root.querySelectorAll('.sa-controls button').forEach((b) => b.addEventListener('click', sync));
  apply();

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    tl.go(TOTAL);
  } else {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => (e.isIntersecting ? tl.play() : tl.pause())),
      { threshold: 0.3 }
    );
    io.observe(root);
  }
})();</script>
</div>
<!-- sa:embed-end -->
</body>
</html>
