<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Effects sampler — classic palette</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>Effects sampler</h1>
<p>Every catalog effect running live in the classic palette. Hover a cell for the technique. This diagram is the canonical reference for shared/effects.css.</p>

<!-- fg:embed-start -->
<div class="fg-diagram fg-effects-sampler">
<style>
/* fg:begin palette-classic v1 */
.fg-effects-sampler {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-hover: #334155;
  --border: #334155;
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --ok: #34d399;
  --warn: #fbbf24;
  --hot: #f87171;
  --violet: #a78bfa;
  --accent-dim: #0c3550;
  --ok-dim: #0e4429;
  --warn-dim: #4a3608;
  --hot-dim: #4a1d1d;
  --violet-dim: #2a2350;
  --line: #64748b;
  --font: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  --radius: 12px;
  --radius-sm: 6px;
  --dur-step: 700ms;
  --dur-fast: 0.45s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
/* fg:end palette-classic */
/* fg:begin panel-base v1 */
.fg-effects-sampler {
  background: var(--bg);
  border-radius: var(--radius);
  font-family: var(--font);
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.fg-effects-sampler svg { display: block; width: 100%; height: auto; }
.fg-effects-sampler text { font-family: inherit; }
/* fg:end panel-base */
.fg-effects-sampler { padding: 10px 12px 12px; }

.fg-effects-sampler .efs-cell-label { font-size: 12px; text-anchor: middle; fill: var(--muted); }
.fg-effects-sampler .efs-title { font-size: 14px; font-weight: 600; fill: var(--text); }
.fg-effects-sampler .efs-hex { font-size: 9.5px; text-anchor: middle; font-family: var(--mono); fill: var(--muted); }
.fg-effects-sampler .efs-hit { fill: transparent; cursor: help; }

/* --- glow: static-blurred halo behind node, opacity animated -------- */
.fg-effects-sampler .efs-glow-halo {
  filter: blur(6px); opacity: 0.25;
  animation: fg-efs-glow 2s var(--ease) infinite alternate;
}
@keyframes fg-efs-glow { to { opacity: 0.85; } }

/* --- sweep: clipped bright stripe, translateX --------------------- */
.fg-effects-sampler .efs-sweep { animation: fg-efs-sweep 2.6s var(--ease) infinite; }
@keyframes fg-efs-sweep {
  0%   { transform: translateX(0); opacity: 0; }
  15%  { opacity: 0.7; }
  60%  { transform: translateX(120px); opacity: 0.7; }
  75%, 100% { transform: translateX(120px); opacity: 0; }
}

/* --- draw-in: pathLength dash, ambient loop ----------------------- */
.fg-effects-sampler .efs-draw {
  stroke-dasharray: 1; fill: none; stroke-width: 2.5; stroke-linecap: round;
  animation: fg-efs-draw 2.4s var(--ease) infinite;
}
@keyframes fg-efs-draw {
  0% { stroke-dashoffset: 1; }
  55%, 80% { stroke-dashoffset: 0; opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 0; }
}

/* --- ripple: concentric scaled rings ------------------------------ */
.fg-effects-sampler .efs-ripple {
  fill: none; stroke-width: 2;
  transform-box: fill-box; transform-origin: center;
  animation: fg-efs-ripple 1.8s var(--ease) infinite;
}
.fg-effects-sampler .efs-ripple-2 { animation-delay: 0.6s; }
@keyframes fg-efs-ripple {
  0%   { transform: scale(0.4); opacity: 0.9; }
  100% { transform: scale(2.4); opacity: 0; }
}

/* --- shimmer: skewed stripe across panel cell --------------------- */
.fg-effects-sampler .efs-shimmer { animation: fg-efs-shimmer 3.2s linear infinite; }
@keyframes fg-efs-shimmer {
  from { transform: translateX(-60px) skewX(-20deg); }
  to   { transform: translateX(140px) skewX(-20deg); }
}

/* --- flash: one-shot color blink, retriggered by JS --------------- */
.fg-effects-sampler .efs-flashable.is-flashing { animation: fg-efs-flash 0.6s var(--ease) 1; }
@keyframes fg-efs-flash { 30% { fill: var(--flash-fill); stroke: var(--flash-stroke); } }

/* --- caption ------------------------------------------------------ */
.fg-effects-sampler .fg-caption {
  margin-top: 10px; padding: 10px 14px; min-height: 3.2em;
  background: var(--panel); border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0; color: var(--muted); font-size: 13px;
  transition: color 0.3s;
}
.fg-effects-sampler .fg-caption.is-active { color: var(--text); }
.fg-effects-sampler .fg-caption strong { color: var(--accent); font-weight: 600; }

/* fg:begin reduced-motion v1 */
@media (prefers-reduced-motion: reduce) {
  .fg-effects-sampler, .fg-effects-sampler * { transition: none !important; animation: none !important; }
}
/* fg:end reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .fg-effects-sampler .efs-glow-halo { animation: none; opacity: 0.5; }
  .fg-effects-sampler .efs-sweep, .fg-effects-sampler .efs-shimmer { display: none; }
  .fg-effects-sampler .efs-draw { animation: none; stroke-dashoffset: 0; }
  .fg-effects-sampler .efs-ripple { animation: none; transform: scale(1.4); opacity: 0.25; }
  .fg-effects-sampler .efs-ripple-2 { opacity: 0; }
  .fg-effects-sampler .efs-comet { display: none; }
  .fg-effects-sampler .efs-comet-fallback { opacity: 1 !important; }
}
</style>

<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Seven animation effects — glow, sweep, comet, draw-in, ripple, shimmer, flash — rendered in the classic dark palette, with accent and dim-fill swatches.">
  <text x="16" y="26" class="efs-title">classic — the figura palette</text>

  <!-- glow -->
  <g data-info="Glow — the node is duplicated behind itself with a single static blur(6px); only the halo's opacity animates. Never animate SVG filters.">
    <rect class="efs-glow-halo" x="30" y="60" width="66" height="66" rx="10" fill="var(--ok)"/>
    <rect x="30" y="60" width="66" height="66" rx="10" fill="var(--panel)" stroke="var(--ok)" stroke-width="2"/>
    <text x="63" y="150" class="efs-cell-label">glow</text>
    <rect class="efs-hit" x="20" y="45" width="86" height="115"/>
  </g>

  <!-- sweep -->
  <g data-info="Highlight sweep — a soft-edged stripe clipped to the region, driven purely by translateX (compositable). Gradient attributes are never animated.">
    <clipPath id="efs-sweep-clip"><rect x="130" y="60" width="100" height="66" rx="10"/></clipPath>
    <rect x="130" y="60" width="100" height="66" rx="10" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
    <g clip-path="url(#efs-sweep-clip)">
      <rect class="efs-sweep" x="110" y="52" width="26" height="84" fill="var(--violet)" opacity="0.6" transform-origin="center"/>
    </g>
    <text x="180" y="150" class="efs-cell-label">highlight sweep</text>
    <rect class="efs-hit" x="125" y="45" width="110" height="115"/>
  </g>

  <!-- comet -->
  <g data-info="Comet — SMIL animateMotion along an SVG path; trail circles repeat the same motion with negative begin offsets. SMIL ignores reduced-motion, so the group is CSS-gated.">
    <path id="efs-route" d="M 268 120 C 300 60, 350 60, 382 118" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4 4"/>
    <g class="efs-comet">
      <circle r="6" fill="var(--accent)">
        <animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#efs-route"/></animateMotion>
      </circle>
      <circle r="4" fill="var(--accent)" opacity="0.45">
        <animateMotion dur="2.2s" begin="-2.11s" repeatCount="indefinite"><mpath href="#efs-route"/></animateMotion>
      </circle>
      <circle r="2.5" fill="var(--accent)" opacity="0.22">
        <animateMotion dur="2.2s" begin="-2.02s" repeatCount="indefinite"><mpath href="#efs-route"/></animateMotion>
      </circle>
    </g>
    <circle class="efs-comet-fallback" cx="382" cy="118" r="5" fill="var(--accent)" opacity="0"/>
    <text x="325" y="150" class="efs-cell-label">comet</text>
    <rect class="efs-hit" x="260" y="45" width="130" height="115"/>
  </g>

  <!-- draw-in -->
  <g data-info="Draw-in — pathLength=1 normalizes dash math (no getTotalLength measuring); stroke-dashoffset animates 1 to 0.">
    <path class="efs-draw" pathLength="1" d="M 420 118 C 445 60, 490 130, 520 70" stroke="var(--warn)"/>
    <text x="470" y="150" class="efs-cell-label">draw-in</text>
    <rect class="efs-hit" x="412" y="45" width="118" height="115"/>
  </g>

  <!-- ripple -->
  <g data-info="Pulse/ripple — concentric rings scaled with CSS transform; transform-box: fill-box keeps the origin on the circle. Staggered delays make the emission feel continuous.">
    <circle cx="595" cy="93" r="12" fill="var(--panel)" stroke="var(--hot)" stroke-width="2"/>
    <circle class="efs-ripple" cx="595" cy="93" r="14" stroke="var(--hot)"/>
    <circle class="efs-ripple efs-ripple-2" cx="595" cy="93" r="14" stroke="var(--hot)"/>
    <text x="595" y="150" class="efs-cell-label">ripple</text>
    <rect class="efs-hit" x="550" y="45" width="90" height="115"/>
  </g>

  <!-- shimmer -->
  <g data-info="Shimmer — a skewed translucent stripe clipped to the panel, opacity ≤0.12 on dark. Quiet by design: it says 'alive', not 'look at me'.">
    <clipPath id="efs-shim-clip"><rect x="30" y="170" width="100" height="50" rx="8"/></clipPath>
    <rect x="30" y="170" width="100" height="50" rx="8" fill="var(--panel)" stroke="var(--border)" stroke-width="1.5"/>
    <g clip-path="url(#efs-shim-clip)">
      <rect class="efs-shimmer" x="30" y="162" width="30" height="66" fill="#ffffff" opacity="0.10"/>
    </g>
    <text x="80" y="240" class="efs-cell-label">shimmer</text>
    <rect class="efs-hit" x="25" y="165" width="110" height="80"/>
  </g>

  <!-- flash -->
  <g data-info="Flash — a one-shot 600ms color blink triggered by re-adding a class after a forced reflow (restartAnimation in snippets.js). Reduced motion swaps the color instantly instead.">
    <rect class="efs-flashable" data-fg="flash" x="170" y="170" width="70" height="50" rx="8"
          fill="var(--panel)" stroke="var(--border)" stroke-width="2"
          style="--flash-fill: var(--ok-dim); --flash-stroke: var(--ok);"/>
    <text x="205" y="240" class="efs-cell-label">flash</text>
    <rect class="efs-hit" x="165" y="165" width="80" height="80"/>
  </g>

  <!-- accent swatches with their dim state fills -->
  <g data-info="Accents and dim state fills — every hue pairs with a -dim fill (the hue at ~15% over the panel) for is-step-N active boxes. Both always come from the palette block, never hand-mixed.">
    <rect x="300" y="176" width="56" height="26" rx="6" fill="var(--accent)"/><text x="328" y="216" class="efs-hex">38bdf8</text>
    <rect x="364" y="176" width="56" height="26" rx="6" fill="var(--ok)"/><text x="392" y="216" class="efs-hex">34d399</text>
    <rect x="428" y="176" width="56" height="26" rx="6" fill="var(--warn)"/><text x="456" y="216" class="efs-hex">fbbf24</text>
    <rect x="492" y="176" width="56" height="26" rx="6" fill="var(--hot)"/><text x="520" y="216" class="efs-hex">f87171</text>
    <rect x="556" y="176" width="56" height="26" rx="6" fill="var(--violet)"/><text x="584" y="216" class="efs-hex">a78bfa</text>
    <rect x="300" y="224" width="56" height="14" rx="4" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="1"/>
    <rect x="364" y="224" width="56" height="14" rx="4" fill="var(--ok-dim)" stroke="var(--ok)" stroke-width="1"/>
    <rect x="428" y="224" width="56" height="14" rx="4" fill="var(--warn-dim)" stroke="var(--warn)" stroke-width="1"/>
    <rect x="492" y="224" width="56" height="14" rx="4" fill="var(--hot-dim)" stroke="var(--hot)" stroke-width="1"/>
    <rect x="556" y="224" width="56" height="14" rx="4" fill="var(--violet-dim)" stroke="var(--violet)" stroke-width="1"/>
    <text x="300" y="262" class="efs-cell-label" style="text-anchor: start">accents: sky · emerald · amber · red · violet — each over its dim state fill</text>
    <rect class="efs-hit" x="295" y="165" width="330" height="105"/>
  </g>
</svg>

<div class="fg-caption" data-fg="caption">Hover any cell for the technique behind its effect.</div>

<script>(() => {
  const root = document.currentScript.closest('.fg-diagram');
  const caption = root.querySelector('[data-fg="caption"]');
  const DEFAULT = 'Hover any cell for the technique behind its effect.';
  root.querySelectorAll('[data-info]').forEach((g) => {
    g.addEventListener('mouseenter', () => {
      caption.textContent = g.getAttribute('data-info');
      caption.classList.add('is-active');
    });
    g.addEventListener('mouseleave', () => {
      caption.textContent = DEFAULT;
      caption.classList.remove('is-active');
    });
  });

  function restartAnimation(el, cls) {
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
  }
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const flashes = root.querySelectorAll('.efs-flashable');
    let visible = false;
    const tick = () => { if (visible) flashes.forEach((el) => restartAnimation(el, 'is-flashing')); };
    setInterval(tick, 3000);
    new IntersectionObserver((entries) => entries.forEach((e) => {
      visible = e.isIntersecting;
      if (visible) tick();
    }), { threshold: 0.2 }).observe(root);
  }
})();</script>
</div>
<!-- fg:embed-end -->
</body>
</html>
