<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subword fusion: the model never sees the word</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>Subword fusion</h1>
<p>"Unbelievable" is one word to a reader and three fragments to a model — fragments that mean nothing until they are bound to their neighbors.</p>

<!-- fg:embed-start -->
<div class="fg-diagram fg-subword-fusion">
<style>
/* fg:begin palette-classic v1 */
.fg-subword-fusion {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-hover: #334155;
  --border: #334155;
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --ok: #34d399;
  --warn: #fbbf24;
  --hot: #f87171;
  --violet: #a78bfa;
  --line: #64748b;
  --font: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  --radius: 12px;
  --radius-sm: 6px;
  --dur-step: 700ms;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
/* fg:end palette-classic */
/* fg:begin panel-base v1 */
.fg-subword-fusion {
  background: var(--bg);
  border-radius: 12px;
  font-family: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.fg-subword-fusion svg { display: block; width: 100%; height: auto; }
.fg-subword-fusion text { font-family: inherit; }
/* fg:end panel-base */
.fg-subword-fusion {
  padding: 16px 16px 12px;
}


.fg-subword-fusion .swf-label { fill: var(--text); font-size: 14px; font-weight: 600; }
.fg-subword-fusion .swf-note { fill: var(--muted); font-size: 11px; }
.fg-subword-fusion .swf-mono { font-family: var(--mono); }

.fg-subword-fusion .swf-tok {
  fill: var(--panel); stroke: var(--border); stroke-width: 1.5;
  transition: fill 0.7s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}
.fg-subword-fusion .swf-word { fill: var(--text); font-size: 14px; text-anchor: middle; }
.fg-subword-fusion .swf-sub { fill: var(--muted); font-size: 11px; text-anchor: middle; transition: fill 0.7s, opacity 0.7s; }

/* step-gated groups */
.fg-subword-fusion .swf-s { opacity: 0; transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1); }

/* step 0: the human's word */
.fg-subword-fusion.is-step-0 .swf-human,
.fg-subword-fusion.is-step-1 .swf-human,
.fg-subword-fusion.is-step-2 .swf-human,
.fg-subword-fusion.is-step-3 .swf-human { opacity: 1; }

/* step 1: fragments appear */
.fg-subword-fusion.is-step-1 .swf-frags,
.fg-subword-fusion.is-step-2 .swf-frags,
.fg-subword-fusion.is-step-3 .swf-frags { opacity: 1; }
.fg-subword-fusion.is-step-1 .swf-split,
.fg-subword-fusion.is-step-2 .swf-split,
.fg-subword-fusion.is-step-3 .swf-split { opacity: 1; }
.fg-subword-fusion.is-step-1 .swf-qmarks { opacity: 1; }

/* step 2: binding arcs */
.fg-subword-fusion.is-step-2 .swf-arcs,
.fg-subword-fusion.is-step-3 .swf-arcs { opacity: 1; }
.fg-subword-fusion.is-step-2 .swf-frag .swf-tok,
.fg-subword-fusion.is-step-3 .swf-frag .swf-tok { stroke: var(--accent); }

/* step 3: fused meaning */
.fg-subword-fusion.is-step-3 .swf-fused { opacity: 1; }
.fg-subword-fusion.is-step-3 .swf-frag .swf-tok { fill: #0e4429; stroke: var(--ok); }

/* per-step footer captions */
.fg-subword-fusion .swf-cap { opacity: 0; transition: opacity 0.45s; }
.fg-subword-fusion.is-step-0 .swf-cap-0, .fg-subword-fusion.is-step-1 .swf-cap-1,
.fg-subword-fusion.is-step-2 .swf-cap-2, .fg-subword-fusion.is-step-3 .swf-cap-3 { opacity: 1; }

.fg-subword-fusion .swf-arc {
  fill: none; stroke: var(--ok); stroke-width: 2.5;
}

/* fg:begin controls-bar v1 */
.fg-subword-fusion .fg-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.fg-subword-fusion .fg-controls button {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; width: 34px; height: 28px; font-size: 13px;
  cursor: pointer; padding: 0; line-height: 1;
}
.fg-subword-fusion .fg-controls button:hover { border-color: var(--fg-ctl-accent, var(--accent)); }
.fg-subword-fusion .fg-controls [data-fg="counter"] {
  color: var(--muted); font-size: 12px; margin-left: 4px;
  font-variant-numeric: tabular-nums;
}
/* fg:end controls-bar */

/* fg:begin reduced-motion v1 */
@media (prefers-reduced-motion: reduce) {
  .fg-subword-fusion, .fg-subword-fusion * { transition: none !important; animation: none !important; }
}
/* fg:end reduced-motion */
</style>

<svg viewBox="0 0 720 330" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Step animation: the word unbelievable, as a reader sees it, splits into three subword tokens, un, believ, and able. Question marks show that each fragment alone has no meaning. Arcs then bind the fragments to each other, and the three blocks fuse into one green concept spread across three positions.">
  <defs>
    <marker id="swf-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- what the reader sees -->
  <g class="swf-human">
    <text class="swf-label" x="40" y="46">what you read</text>
    <rect class="swf-tok" x="230" y="24" width="170" height="38" rx="6"/>
    <text class="swf-word" x="315" y="48">unbelievable</text>
  </g>

  <!-- split arrows -->
  <g class="swf-s swf-split">
    <path d="M 280 66 L 190 118" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#swf-arrow)"/>
    <path d="M 315 66 L 315 118" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#swf-arrow)"/>
    <path d="M 350 66 L 440 118" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#swf-arrow)"/>
  </g>

  <!-- fragments -->
  <g class="swf-s swf-frags">
    <text class="swf-label" x="40" y="152">what the model sees</text>
    <g class="swf-frag">
      <rect class="swf-tok" x="150" y="128" width="88" height="38" rx="6"/>
      <text class="swf-word swf-mono" x="194" y="152">&#9601;un</text>
    </g>
    <g class="swf-frag">
      <rect class="swf-tok" x="262" y="128" width="106" height="38" rx="6"/>
      <text class="swf-word swf-mono" x="315" y="152">believ</text>
    </g>
    <g class="swf-frag">
      <rect class="swf-tok" x="392" y="128" width="88" height="38" rx="6"/>
      <text class="swf-word swf-mono" x="436" y="152">able</text>
    </g>
  </g>

  <!-- step 1 annotations: fragments alone are meaningless -->
  <g class="swf-s swf-qmarks">
    <text class="swf-sub" x="194" y="188">negation? French "un"?</text>
    <text class="swf-sub" x="315" y="188">believe? beleaguer? no word</text>
    <text class="swf-sub" x="436" y="188">can? a table? -able?</text>
  </g>

  <!-- step 2: binding arcs between neighbors -->
  <g class="swf-s swf-arcs">
    <path class="swf-arc" d="M 290 128 C 265 104, 230 104, 208 122" marker-end="url(#swf-arrow)"/>
    <path class="swf-arc" d="M 420 128 C 395 100, 340 100, 322 122" marker-end="url(#swf-arrow)"/>
    <text class="swf-note" x="500" y="118">each fragment imports its</text>
    <text class="swf-note" x="500" y="132">meaning from its neighbors</text>
  </g>

  <!-- step 3: fused concept -->
  <g class="swf-s swf-fused">
    <path d="M 315 200 L 315 232" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#swf-arrow)"/>
    <rect x="180" y="240" width="270" height="40" rx="8" fill="#0e4429" stroke="#34d399" stroke-width="1.5"/>
    <text class="swf-word" x="315" y="265">one concept, three positions</text>
  </g>

  <!-- footer captions (fixed slot, no reflow) -->
  <text class="swf-note swf-cap swf-cap-0" x="40" y="315">Step 0 &#8212; a reader receives whole words. The model never will.</text>
  <text class="swf-note swf-cap swf-cap-1" x="40" y="315">Step 1 &#8212; the tokenizer splits by frequency, not meaning. Each fragment alone is ambiguous between unrelated readings.</text>
  <text class="swf-note swf-cap swf-cap-2" x="40" y="315">Step 2 &#8212; the fragments must be bound to their neighbors before any classical word-sense question can even be asked.</text>
  <text class="swf-note swf-cap swf-cap-3" x="40" y="315">Step 3 &#8212; the word re-assembles as one concept spread across three positions. Every input token starts this way.</text>
</svg>

<div class="fg-controls">
  <button data-fg="prev" aria-label="Previous step">&#8249;</button>
  <button data-fg="play" aria-label="Play or pause">&#9654;</button>
  <button data-fg="next" aria-label="Next step">&#8250;</button>
  <span data-fg="counter"></span>
</div>

<script>(() => {
  const root = document.currentScript.closest('.fg-diagram');
  const TOTAL = 3, STEP_MS = 1800;
  // fg:begin timeline-core v1
  let step = 0, timer = null;
  function apply() {
    for (let i = 0; i <= TOTAL; i++) root.classList.remove('is-step-' + i);
    root.classList.add('is-step-' + step);
    root.dispatchEvent(new CustomEvent('fg:step', { detail: { step } }));
  }
  const tl = {
    get step() { return step; },
    get playing() { return timer !== null; },
    go(n) { step = ((n % (TOTAL + 1)) + TOTAL + 1) % (TOTAL + 1); apply(); },
    next() { tl.go(step + 1); },
    prev() { tl.go(step - 1); },
    play() { if (!timer) { timer = setInterval(() => tl.next(), STEP_MS); root.classList.add('is-playing'); } },
    pause() { clearInterval(timer); timer = null; root.classList.remove('is-playing'); },
  };
  const btn = (name) => root.querySelector('[data-fg="' + name + '"]');
  btn('prev').addEventListener('click', () => { tl.pause(); tl.prev(); });
  btn('next').addEventListener('click', () => { tl.pause(); tl.next(); });
  btn('play').addEventListener('click', () => (tl.playing ? tl.pause() : tl.play()));
  const counter = btn('counter');
  function sync() {
    if (counter) counter.textContent = tl.step + ' / ' + TOTAL;
    btn('play').textContent = tl.playing ? '❚❚' : '▶';
  }
  root.addEventListener('fg:step', sync);
  root.querySelectorAll('.fg-controls button').forEach((b) => b.addEventListener('click', sync));
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // fg:end timeline-core
  // fg:begin timeline-start v1
  apply();
  if (reduced) {
    tl.go(TOTAL); // show final state, manual stepping still available
  } else {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => (e.isIntersecting ? tl.play() : tl.pause())),
      { threshold: 0.3 }
    );
    io.observe(root);
  }
  // fg:end timeline-start
})();</script>
</div>
<!-- fg:embed-end -->
</body>
</html>
