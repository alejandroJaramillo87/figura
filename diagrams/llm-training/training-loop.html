<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The training loop: forward, loss, backward, update</title>
<link rel="stylesheet" href="../../shared/preview.css">
</head>
<body>
<h1>The training loop</h1>
<p>One optimization step: activations flow forward, the loss lights up, gradients comet backward, and every layer pulses as its weights update.</p>

<!-- fg:embed-start -->
<div class="fg-diagram fg-training-loop">
<style>
/* fg:begin palette-classic v1 */
.fg-training-loop {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-hover: #334155;
  --border: #334155;
  --text: #f8fafc;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --ok: #34d399;
  --warn: #fbbf24;
  --hot: #f87171;
  --violet: #a78bfa;
  --accent-dim: #0c3550;
  --ok-dim: #0e4429;
  --warn-dim: #4a3608;
  --hot-dim: #4a1d1d;
  --violet-dim: #2a2350;
  --line: #64748b;
  --font: "Work Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  --radius: 12px;
  --radius-sm: 6px;
  --dur-step: 700ms;
  --dur-fast: 0.45s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}
/* fg:end palette-classic */
/* fg:begin panel-base v1 */
.fg-training-loop {
  background: var(--bg);
  border-radius: var(--radius);
  font-family: var(--font);
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.fg-training-loop svg { display: block; width: 100%; height: auto; }
.fg-training-loop text { font-family: inherit; }
/* fg:end panel-base */
.fg-training-loop {
  padding: 16px 16px 12px;
}


.fg-training-loop .trl-node { fill: var(--panel); stroke: var(--border); stroke-width: 2; transition: stroke 0.4s, fill 0.4s; }
.fg-training-loop .trl-title { fill: var(--text); font-size: 14px; font-weight: 600; text-anchor: middle; }
.fg-training-loop .trl-sub   { fill: var(--muted); font-size: 11px; text-anchor: middle; }
.fg-training-loop .trl-lab   { fill: var(--muted); font-size: 12px; }

/* forward edges: draw-in on step 1, stay lit through step 2 */
.fg-training-loop .trl-fwd {
  stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round;
  stroke-dasharray: 1; stroke-dashoffset: 1; opacity: 0.35;
  transition: stroke-dashoffset 0.7s var(--ease), opacity 0.4s;
}
.fg-training-loop.is-step-1 .trl-fwd,
.fg-training-loop.is-step-2 .trl-fwd { stroke-dashoffset: 0; opacity: 0.9; }
.fg-training-loop.is-step-1 .trl-fwd-1 { transition-delay: 0s; }
.fg-training-loop.is-step-1 .trl-fwd-2 { transition-delay: 0.18s; }
.fg-training-loop.is-step-1 .trl-fwd-3 { transition-delay: 0.36s; }
.fg-training-loop.is-step-1 .trl-fwd-4 { transition-delay: 0.54s; }
.fg-training-loop.is-step-3 .trl-fwd,
.fg-training-loop.is-step-4 .trl-fwd { stroke-dashoffset: 0; opacity: 0.18; }

/* backward edge (single long path under the chain) */
.fg-training-loop .trl-bwd {
  stroke: var(--hot); stroke-width: 2; fill: none; stroke-linecap: round;
  stroke-dasharray: 1; stroke-dashoffset: 1; opacity: 0.35;
  transition: stroke-dashoffset 1.1s var(--ease), opacity 0.4s;
}
.fg-training-loop.is-step-3 .trl-bwd,
.fg-training-loop.is-step-4 .trl-bwd { stroke-dashoffset: 0; opacity: 0.9; }
.fg-training-loop.is-step-4 .trl-bwd { opacity: 0.25; }

/* comets: hidden except in their step; SMIL is kicked by JS */
.fg-training-loop .trl-comet-fwd, .fg-training-loop .trl-comet-bwd { opacity: 0; transition: opacity 0.3s; }
.fg-training-loop.is-step-1 .trl-comet-fwd { opacity: 1; }
.fg-training-loop.is-step-3 .trl-comet-bwd { opacity: 1; }

/* loss glow: pre-blurred halo, opacity pulse only during step 2 */
.fg-training-loop .trl-loss-halo { filter: blur(7px); opacity: 0; transition: opacity 0.4s; }
.fg-training-loop.is-step-2 .trl-loss-halo { animation: fg-trl-glow 1.4s var(--ease) infinite alternate; }
@keyframes fg-trl-glow { from { opacity: 0.3; } to { opacity: 0.85; } }
.fg-training-loop.is-step-2 .trl-loss-node { stroke: var(--warn); }
.fg-training-loop.is-step-2 .trl-loss-edge { opacity: 0.9; }
.fg-training-loop .trl-loss-edge {
  stroke: var(--warn); stroke-width: 2; fill: none; stroke-dasharray: 4 4; opacity: 0.25; transition: opacity 0.4s;
}

/* logits flash on step 2 */
.fg-training-loop .trl-flashable.is-flashing { animation: fg-trl-flash 0.6s var(--ease) 1; }
@keyframes fg-trl-flash { 30% { fill: var(--ok-dim); stroke: var(--ok); } }

/* weight-update ripples, staggered per layer, only in step 4 */
.fg-training-loop .trl-ripple {
  fill: none; stroke: var(--ok); stroke-width: 2; opacity: 0;
  transform-box: fill-box; transform-origin: center;
}
.fg-training-loop.is-step-4 .trl-ripple { animation: fg-trl-ripple 1.5s var(--ease) infinite; }
.fg-training-loop.is-step-4 .trl-ripple-l1 { animation-delay: 0s; }
.fg-training-loop.is-step-4 .trl-ripple-l2 { animation-delay: 0.25s; }
.fg-training-loop.is-step-4 .trl-ripple-l3 { animation-delay: 0.5s; }
.fg-training-loop.is-step-4 .trl-ripple-emb { animation-delay: 0.75s; }
@keyframes fg-trl-ripple {
  0%   { transform: scale(0.5); opacity: 0.9; }
  100% { transform: scale(2.1); opacity: 0; }
}
.fg-training-loop.is-step-4 .trl-layer { stroke: var(--ok); }

/* idle shimmer across the layer chain (step 0 only) */
.fg-training-loop .trl-shimmer { opacity: 0; }
.fg-training-loop.is-step-0 .trl-shimmer { opacity: 1; animation: fg-trl-shimmer 3.4s linear infinite; }
@keyframes fg-trl-shimmer {
  from { transform: translateX(0) skewX(-20deg); }
  to   { transform: translateX(620px) skewX(-20deg); }
}

/* phase captions */
.fg-training-loop .trl-phase { opacity: 0; transition: opacity 0.45s; }
.fg-training-loop.is-step-0 .trl-phase-0, .fg-training-loop.is-step-1 .trl-phase-1,
.fg-training-loop.is-step-2 .trl-phase-2, .fg-training-loop.is-step-3 .trl-phase-3,
.fg-training-loop.is-step-4 .trl-phase-4 { opacity: 1; }

/* controls */
/* fg:begin controls-bar v1 */
.fg-training-loop .fg-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.fg-training-loop .fg-controls button {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; width: 34px; height: 28px; font-size: 13px;
  cursor: pointer; padding: 0; line-height: 1;
}
.fg-training-loop .fg-controls button:hover { border-color: var(--fg-ctl-accent, var(--accent)); }
.fg-training-loop .fg-controls [data-fg="counter"] {
  color: var(--muted); font-size: 12px; margin-left: 4px;
  font-variant-numeric: tabular-nums;
}
/* fg:end controls-bar */
.fg-training-loop { --fg-ctl-accent: var(--accent); }

/* fg:begin reduced-motion v1 */
@media (prefers-reduced-motion: reduce) {
  .fg-training-loop, .fg-training-loop * { transition: none !important; animation: none !important; }
}
/* fg:end reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .fg-training-loop .trl-comet-fwd, .fg-training-loop .trl-comet-bwd, .fg-training-loop .trl-shimmer { display: none; }
  .fg-training-loop.is-step-2 .trl-loss-halo { opacity: 0.5; }
  .fg-training-loop.is-step-4 .trl-ripple { opacity: 0.25; transform: scale(1.4); }
}
</style>

<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="One training step: activations flow forward from embeddings through three layers to logits, the loss node lights up against the target, gradients flow backward, and each layer pulses as its weights update.">
  <!-- forward chain -->
  <g>
    <rect class="trl-node trl-node-emb" x="24"  y="150" width="112" height="64" rx="10"/>
    <text class="trl-title" x="80"  y="178">Embed</text><text class="trl-sub" x="80" y="196">tokens → vectors</text>
    <rect class="trl-node trl-layer trl-node-l1" x="180" y="150" width="112" height="64" rx="10"/>
    <text class="trl-title" x="236" y="178">Layer 1</text><text class="trl-sub" x="236" y="196">attn + mlp</text>
    <rect class="trl-node trl-layer trl-node-l2" x="336" y="150" width="112" height="64" rx="10"/>
    <text class="trl-title" x="392" y="178">Layer 2</text><text class="trl-sub" x="392" y="196">attn + mlp</text>
    <rect class="trl-node trl-layer trl-node-l3" x="492" y="150" width="112" height="64" rx="10"/>
    <text class="trl-title" x="548" y="178">Layer 3</text><text class="trl-sub" x="548" y="196">attn + mlp</text>
    <rect class="trl-node trl-flashable trl-node-logits" x="648" y="150" width="92" height="64" rx="10"/>
    <text class="trl-title" x="694" y="178">Logits</text><text class="trl-sub" x="694" y="196">|V| scores</text>
  </g>

  <!-- idle shimmer stripe clipped to the chain band -->
  <clipPath id="trl-chain-clip"><rect x="24" y="150" width="716" height="64" rx="10"/></clipPath>
  <g clip-path="url(#trl-chain-clip)">
    <rect class="trl-shimmer" x="-40" y="140" width="34" height="84" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- forward edges (top lane) -->
  <path id="trl-f1" class="trl-fwd trl-fwd-1" pathLength="1" d="M 136 172 L 180 172"/>
  <path id="trl-f2" class="trl-fwd trl-fwd-2" pathLength="1" d="M 292 172 L 336 172"/>
  <path id="trl-f3" class="trl-fwd trl-fwd-3" pathLength="1" d="M 448 172 L 492 172"/>
  <path id="trl-f4" class="trl-fwd trl-fwd-4" pathLength="1" d="M 604 172 L 648 172"/>
  <text class="trl-lab" x="24" y="136">forward →</text>

  <!-- loss node upper right -->
  <rect class="trl-loss-halo" x="612" y="34" width="128" height="58" rx="10" fill="var(--warn)"/>
  <rect class="trl-node trl-loss-node" x="612" y="34" width="128" height="58" rx="10"/>
  <text class="trl-title" x="676" y="59">Loss</text>
  <text class="trl-sub" x="676" y="77">cross-entropy vs ŷ</text>
  <path class="trl-loss-edge" d="M 694 150 L 682 92"/>

  <!-- backward edge (bottom lane, right to left) -->
  <path id="trl-broute" class="trl-bwd" pathLength="1"
        d="M 694 214 C 694 258, 620 258, 548 258 L 236 258 C 160 258, 80 258, 80 214"/>
  <text class="trl-lab" x="24" y="292">← backward (∂L/∂W)</text>

  <!-- forward comets (step 1): full-chain route -->
  <path id="trl-froute" d="M 80 172 L 694 172" fill="none" stroke="none"/>
  <g class="trl-comet-fwd">
    <circle r="6" fill="var(--accent)">
      <animateMotion id="trl-cf-head" dur="1.8s" begin="indefinite" repeatCount="1" fill="freeze"><mpath href="#trl-froute"/></animateMotion>
    </circle>
    <circle r="4" fill="var(--accent)" opacity="0.45">
      <animateMotion dur="1.8s" begin="trl-cf-head.begin+0.10s" repeatCount="1" fill="freeze"><mpath href="#trl-froute"/></animateMotion>
    </circle>
    <circle r="2.5" fill="var(--accent)" opacity="0.22">
      <animateMotion dur="1.8s" begin="trl-cf-head.begin+0.19s" repeatCount="1" fill="freeze"><mpath href="#trl-froute"/></animateMotion>
    </circle>
  </g>

  <!-- backward comets (step 3): along the backward route -->
  <g class="trl-comet-bwd">
    <circle r="6" fill="var(--hot)">
      <animateMotion id="trl-cb-head" dur="2.2s" begin="indefinite" repeatCount="1" fill="freeze"><mpath href="#trl-broute"/></animateMotion>
    </circle>
    <circle r="4" fill="var(--hot)" opacity="0.45">
      <animateMotion dur="2.2s" begin="trl-cb-head.begin+0.10s" repeatCount="1" fill="freeze"><mpath href="#trl-broute"/></animateMotion>
    </circle>
    <circle r="2.5" fill="var(--hot)" opacity="0.22">
      <animateMotion dur="2.2s" begin="trl-cb-head.begin+0.19s" repeatCount="1" fill="freeze"><mpath href="#trl-broute"/></animateMotion>
    </circle>
  </g>

  <!-- weight-update ripples -->
  <circle class="trl-ripple trl-ripple-l1"  cx="236" cy="182" r="20"/>
  <circle class="trl-ripple trl-ripple-l2"  cx="392" cy="182" r="20"/>
  <circle class="trl-ripple trl-ripple-l3"  cx="548" cy="182" r="20"/>
  <circle class="trl-ripple trl-ripple-emb" cx="80"  cy="182" r="20"/>

  <!-- phase captions -->
  <text class="trl-sub trl-phase trl-phase-0" x="24" y="376" style="text-anchor: start">A batch is loaded. Nothing has moved yet — the network is a frozen function.</text>
  <text class="trl-sub trl-phase trl-phase-1" x="24" y="376" style="text-anchor: start">Forward: activations flow left to right; every layer's output is stashed for backprop.</text>
  <text class="trl-sub trl-phase trl-phase-2" x="24" y="376" style="text-anchor: start">Loss: logits meet the target — one scalar summarizes how wrong the whole batch was.</text>
  <text class="trl-sub trl-phase trl-phase-3" x="24" y="376" style="text-anchor: start">Backward: the chain rule sends gradients right to left through the stashed activations.</text>
  <text class="trl-sub trl-phase trl-phase-4" x="24" y="376" style="text-anchor: start">Update: the optimizer nudges every weight matrix — the network is now a different function.</text>
</svg>

<div class="fg-controls">
  <button data-fg="prev" aria-label="Previous step">‹</button>
  <button data-fg="play" aria-label="Play or pause">▶</button>
  <button data-fg="next" aria-label="Next step">›</button>
  <span data-fg="counter"></span>
</div>

<script>(() => {
  const root = document.currentScript.closest('.fg-diagram');
  const TOTAL = 4, STEP_MS = 2400;
  // fg:begin timeline-core v1
  let step = 0, timer = null;
  function apply() {
    for (let i = 0; i <= TOTAL; i++) root.classList.remove('is-step-' + i);
    root.classList.add('is-step-' + step);
    root.dispatchEvent(new CustomEvent('fg:step', { detail: { step } }));
  }
  const tl = {
    get step() { return step; },
    get playing() { return timer !== null; },
    go(n) { step = ((n % (TOTAL + 1)) + TOTAL + 1) % (TOTAL + 1); apply(); },
    next() { tl.go(step + 1); },
    prev() { tl.go(step - 1); },
    play() { if (!timer) { timer = setInterval(() => tl.next(), STEP_MS); root.classList.add('is-playing'); } },
    pause() { clearInterval(timer); timer = null; root.classList.remove('is-playing'); },
  };
  const btn = (name) => root.querySelector('[data-fg="' + name + '"]');
  btn('prev').addEventListener('click', () => { tl.pause(); tl.prev(); });
  btn('next').addEventListener('click', () => { tl.pause(); tl.next(); });
  btn('play').addEventListener('click', () => (tl.playing ? tl.pause() : tl.play()));
  const counter = btn('counter');
  function sync() {
    if (counter) counter.textContent = tl.step + ' / ' + TOTAL;
    btn('play').textContent = tl.playing ? '❚❚' : '▶';
  }
  root.addEventListener('fg:step', sync);
  root.querySelectorAll('.fg-controls button').forEach((b) => b.addEventListener('click', sync));
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // fg:end timeline-core


  // step-triggered comets: kick the SMIL head animations (trails chain off it)
  function launchComets(selector) {
    if (reduced) return;
    root.querySelectorAll(selector).forEach((m) => m.beginElement());
  }
  root.addEventListener('fg:step', (e) => {
    if (e.detail.step === 1) launchComets('#trl-cf-head');
    if (e.detail.step === 3) launchComets('#trl-cb-head');
  });
  // fg:begin timeline-start v1
  apply();
  if (reduced) {
    tl.go(TOTAL); // show final state, manual stepping still available
  } else {
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => (e.isIntersecting ? tl.play() : tl.pause())),
      { threshold: 0.3 }
    );
    io.observe(root);
  }
  // fg:end timeline-start
})();</script>
</div>
<!-- fg:embed-end -->
</body>
</html>
